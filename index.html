<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晚餐吃什麼？14天不重複自訂抽籤器 (GitHub Pages 雲端雙向同步版)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }
        .app-container {
            max-width: 1000px;
        }
        #result {
            font-size: 2rem;
            min-height: 100px;
            border: 2px dashed #ffc107;
            background-color: #fffdf0;
            transition: transform 0.15s ease-in-out;
        }
        .menu-list-container {
            max-height: 380px;
            overflow-y: auto;
        }
        .menu-list-container::-webkit-scrollbar {
            width: 6px;
        }
        .menu-list-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .menu-list-container::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }
        .menu-list-container::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
        .user-profile-img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>
<body class="py-5">

<div class="container app-container">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 bg-white p-3 rounded-4 shadow-sm gap-3">
        <div class="d-flex align-items-center">
            <i class="bi bi-cloud-check-fill text-primary fs-3 me-2"></i>
            <span class="fw-bold text-secondary">雲端同步狀態：</span>
            <span id="syncStatus" class="badge bg-warning text-dark">未登入 (本地儲存)</span>
        </div>
        <div>
            <button id="loginBtn" class="btn btn-outline-dark d-flex align-items-center gap-2" onclick="handleAuthClick()">
                <i class="bi bi-google text-danger"></i> 使用 Google 帳號登入
            </button>
            <div id="userInfo" class="d-none d-flex align-items-center gap-3">
                <img id="userAvatar" class="user-profile-img border" src="" alt="Avatar">
                <span id="userName" class="fw-bold text-dark small">使用者</span>
                <button class="btn btn-sm btn-outline-danger rounded-pill" onclick="handleSignoutClick()">登出</button>
            </div>
        </div>
    </div>

    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold text-danger"><i class="bi bi-egg-fried me-2"></i>晚餐吃什麼？</h1>
        <p class="lead text-muted">登入後將自動讀寫 Google 試算表「Dinner_History_Sync」，完美同步 14 天歷史紀錄！</p>
    </div>

    <div class="row g-4 flex-row-reverse">
        
        <div class="col-md-6">
            <div class="card border-0 shadow-lg h-100">
                <div class="card-body p-4 d-flex flex-column justify-content-between">
                    <div>
                        <h3 class="card-title h4 text-center text-dark mb-4 fw-bold">
                            <i class="bi bi-dice-5 me-2 text-warning"></i>開始抽籤
                        </h3>
                        
                        <div id="result" class="rounded-3 d-flex justify-content-center align-items-center fw-bold text-success shadow-sm mb-4">
                            點擊下方按鈕抽籤
                        </div>
                        
                        <button class="btn btn-danger btn-lg w-100 rounded-pill py-3 fw-bold shadow-sm mb-4" onclick="drawDinner()">
                            <i class="bi bi-cursor-fill me-2"></i>決定就是你了！
                        </button>
                    </div>

                    <div class="border-top pt-3">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="text-secondary mb-0 fw-bold">
                                <i class="bi bi-clock-history me-2"></i>最近 14 天吃過：
                            </h5>
                            <button class="btn btn-outline-secondary btn-sm rounded-pill px-3" onclick="clearHistory()">
                                <i class="bi bi-trash3 me-1"></i>全部清除
                            </button>
                        </div>
                        
                        <div id="historyList" class="d-flex flex-wrap gap-2">
                            </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card border-0 shadow-lg h-100">
                <div class="card-body p-4 d-flex flex-column">
                    <h3 class="card-title h4 text-dark mb-4 fw-bold pb-2 border-bottom">
                        <i class="bi bi-sliders me-2 text-primary"></i>自訂菜單管理
                    </h3>
                    
                    <div class="input-group mb-3 shadow-sm">
                        <input type="text" id="newItemInput" class="form-control" placeholder="想加入什麼晚餐？" onkeypress="handleKeyPress(event)">
                        <button class="btn btn-success px-4" type="button" onclick="addNewItem()">
                            <i class="bi bi-plus-lg me-1"></i>新增
                        </button>
                    </div>

                    <div class="menu-list-container flex-grow-1 pe-1 mb-3">
                        <ul id="menuList" class="list-group list-group-flush">
                            </ul>
                    </div>

                    <button class="btn btn-outline-danger w-100 rounded-pill py-2" onclick="resetMenuToDefault()">
                        <i class="bi bi-arrow-counterclockwise me-1"></i>還原成預設 31 樣菜單
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // =========================================================================
    // ⚠️ 請填入你在 Google Cloud 控制台申請的憑證 ⚠️
    // =========================================================================
    const CLIENT_ID = '562843998665-lifb2eo55nq1nsmh5rr6rn2dkrffocpc.apps.googleusercontent.com'; 
    const API_KEY = 'AIzaSyDikxXx8y_NEtICRFIVyuSyNVT_s77ccW8'; 
    
    // 設定需要讀寫試算表及建立檔案的權限範圍
    const SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets';
    
    let tokenClient;
    let gapiInited = false;
    let gisiInited = false;
    let isLoggedIn = false;
    let spreadsheetId = null;

    // 預設晚餐清單
    const defaultDinnerList = [
        "便當", "披薩", "義大利麵", "肉圓", "油飯", "胡椒餅", 
        "泡麵", "涼麵", "水餃", "鍋貼", "速食", "蚵仔麵線", 
        "牛排", "鹹水雞", "滷味", "咖哩", "火鍋", "壽司", 
        "炒飯", "牛肉麵", "甜不辣", "鹹酥雞", "燒臘", "泰料", 
        "雞排", "刈包", "越南河粉", "臭豆腐", "丼飯", "當歸鴨", "麵類"
    ];

    let dinnerList = JSON.parse(localStorage.getItem('customDinnerList')) || [...defaultDinnerList];
    let history = JSON.parse(localStorage.getItem('dinnerHistory14')) || [];

    // 初始化界面
    updateHistoryUI();
    updateMenuUI();
    setLoginButtonState(false, "正在載入雲端模組...");

    // 確保 Google API 載入完畢才啟動
    window.onload = function() {
        try {
            gapi.load('client', initializeGapiClient);
            gisInit();
        } catch (e) {
            console.error("SDK 載入失敗，可能被瀏覽器插件阻擋:", e);
            setLoginButtonState(false, "雲端模組遭瀏覽器阻擋");
            document.getElementById('syncStatus').className = "badge bg-danger";
            document.getElementById('syncStatus').innerText = "連線受阻 (請檢查 Adblock)";
        }
    };

    async function initializeGapiClient() {
        try {
            await gapi.client.init({
                apiKey: API_KEY,
            });
            
            await gapi.client.load('sheets', 'v4');
            await gapi.client.load('drive', 'v3');
            
            gapiInited = true;
            maybeEnableButtons();
            checkLocalAuthToken();
            console.log("Google API 載入完畢！");
        } catch (err) {
            console.error("GAPI 初始化失敗:", err);
            document.getElementById('syncStatus').className = "badge bg-danger";
            document.getElementById('syncStatus').innerText = "金鑰驗證失敗 (請檢查 GCP 控制台限制)";
        }
    }

    function gisInit() {
        try {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '', 
            });
            gisiInited = true;
            maybeEnableButtons();
        } catch (err) {
            console.error("GIS 初始化失敗:", err);
        }
    }

    function maybeEnableButtons() {
        if (gapiInited && gisiInited) {
            setLoginButtonState(true, '<i class="bi bi-google text-danger"></i> 使用 Google 帳號登入');
        }
    }

    function setLoginButtonState(enabled, htmlContent) {
        const loginBtn = document.getElementById('loginBtn');
        if (loginBtn) {
            loginBtn.disabled = !enabled;
            loginBtn.innerHTML = htmlContent;
        }
    }

    function checkLocalAuthToken() {
        const token = localStorage.getItem('google_access_token');
        if (token) {
            gapi.client.setToken({ access_token: token });
            isLoggedIn = true;
            updateSyncStatusUI(true, "已自動登入，正在連結試算表...");
            fetchUserProfile(token);
            initGoogleSheet();
        }
    }

    function handleAuthClick() {
        if (!gapiInited || !gisiInited) {
            alert('Google SDK 尚未載入完畢，請稍候重試！');
            return;
        }

        if (CLIENT_ID.startsWith('YOUR_GOOGLE')) {
            alert('【設定提示】請先編輯 dinner.html 代碼，填入你在 Google Cloud 申請的 CLIENT_ID 與 API_KEY 才能正常運作喔！');
            return;
        }

        tokenClient.callback = async (resp) => {
            if (resp.error !== undefined) {
                throw (resp);
            }
            localStorage.setItem('google_access_token', resp.access_token);
            isLoggedIn = true;
            updateSyncStatusUI(true, "登入成功，正在初始化試算表...");
            fetchUserProfile(resp.access_token);
            await initGoogleSheet();
        };

        tokenClient.requestAccessToken({ prompt: 'select_account' });
    }

    function handleSignoutClick() {
        const token = gapi.client.getToken();
        if (token !== null) {
            google.accounts.oauth2.revokeToken(token.access_token, () => {
                gapi.client.setToken('');
                localStorage.removeItem('google_access_token');
                localStorage.removeItem('linked_spreadsheet_id');
                isLoggedIn = false;
                spreadsheetId = null;
                updateSyncStatusUI(false);
                setLoginButtonState(true, '<i class="bi bi-google text-danger"></i> 使用 Google 帳號登入');
                alert("已成功登出，改回本地儲存模式。");
            });
        }
    }

    function fetchUserProfile(accessToken) {
        fetch(`https://www.googleapis.com/oauth2/v3/userinfo?access_token=${accessToken}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('loginBtn').classList.add('d-none');
                document.getElementById('userInfo').classList.remove('d-none');
                document.getElementById('userAvatar').src = data.picture || '';
                document.getElementById('userName').innerText = data.name || '已登入用戶';
            })
            .catch(err => console.error("無法讀取用戶個人檔：", err));
    }

    // 搜尋或自動建立試算表，建立後自動讀取雲端歷史
    async function initGoogleSheet() {
        if (!isLoggedIn) return;

        let cachedSheetId = localStorage.getItem('linked_spreadsheet_id');
        
        try {
            if (cachedSheetId) {
                spreadsheetId = cachedSheetId;
                updateSyncStatusUI(true, "雲端試算表連線成功！");
                await fetchHistoryFromGoogleSheet(); // 🌟 讀取雲端歷史
                return;
            }

            const response = await gapi.client.drive.files.list({
                q: "name = 'Dinner_History_Sync' and mimeType = 'application/vnd.google-apps.spreadsheet' and trashed = false",
                fields: 'files(id, name)',
                spaces: 'drive'
            });

            const files = response.result.files;
            if (files && files.length > 0) {
                spreadsheetId = files[0].id;
                localStorage.setItem('linked_spreadsheet_id', spreadsheetId);
                updateSyncStatusUI(true, "已找到現有試算表，連線成功！");
                await fetchHistoryFromGoogleSheet(); // 🌟 讀取雲端歷史
            } else {
                updateSyncStatusUI(true, "正在建立新試算表...");
                
                const spreadsheet = {
                    properties: { title: 'Dinner_History_Sync' },
                    sheets: [{
                        properties: { title: '晚餐紀錄庫' },
                        data: [{
                            startRow: 0,
                            startColumn: 0,
                            rowData: [{
                                values: [
                                    { userEnteredValue: { stringValue: '時間 (Timestamp)' } },
                                    { userEnteredValue: { stringValue: '抽取結果 (Dinner)' } },
                                    { userEnteredValue: { stringValue: '操作類型 (Action)' } }
                                ]
                            }]
                        }]
                    }]
                };

                const createResponse = await gapi.client.sheets.spreadsheets.create({
                    resource: spreadsheet,
                    fields: 'spreadsheetId'
                });

                spreadsheetId = createResponse.result.spreadsheetId;
                localStorage.setItem('linked_spreadsheet_id', spreadsheetId);
                updateSyncStatusUI(true, "試算表建立成功！");
                updateHistoryUI(); // 空白新表，維持當下
            }
        } catch (err) {
            console.error("試算表初始化失敗：", err);
            updateSyncStatusUI(true, "同步失敗，請重新登入", "bg-danger");
        }
    }

    // 🌟 新增：從 Google Sheets 雙向讀取 14 天晚餐歷史紀錄
    async function fetchHistoryFromGoogleSheet() {
        if (!isLoggedIn || !spreadsheetId) return;

        try {
            const response = await gapi.client.sheets.spreadsheets.values.get({
                spreadsheetId: spreadsheetId,
                range: '晚餐紀錄庫!A2:C', // 讀取 A 到 C 欄（排除標題列）
            });

            const rows = response.result.values;
            if (rows && rows.length > 0) {
                let tempHistory = [];
                
                // 由舊到新（從上往下）掃描試算表記錄
                rows.forEach(row => {
                    const dinnerName = row[1];
                    const actionType = row[2];

                    if (actionType === "抽中新晚餐") {
                        // 如果抽中了，加入歷史，並保持最大 14 天長度限制
                        tempHistory.push(dinnerName);
                        if (tempHistory.length > 14) {
                            tempHistory.shift();
                        }
                    } else if (actionType === "手動移除歷史 (解除排除限制)") {
                        // 移除特定某一筆歷史
                        tempHistory = tempHistory.filter(item => item !== dinnerName);
                    } else if (actionType === "全部清除歷史") {
                        // 清空歷史
                        tempHistory = [];
                    }
                });

                // 更新本機變數與快取，並渲染 UI
                history = tempHistory;
                localStorage.setItem('dinnerHistory14', JSON.stringify(history));
                updateHistoryUI();
                updateMenuUI();
                console.log("已從 Google Sheets 同步還原 14 天歷史:", history);
            }
        } catch (err) {
            console.error("無法自 Google Sheets 讀取歷史資料：", err);
        }
    }

    // 更新頂部雲端同步狀態顯示 UI
    function updateSyncStatusUI(loggedIn, text = "雲端同步中", bgClass = "bg-success") {
        const badge = document.getElementById('syncStatus');
        if (loggedIn) {
            badge.className = `badge ${bgClass}`;
            badge.innerHTML = `<i class="bi bi-cloud-arrow-up-fill me-1"></i> ${text}`;
        } else {
            badge.className = "badge bg-warning text-dark";
            badge.innerHTML = "未登入 (本地儲存)";
            document.getElementById('loginBtn').className = 'btn btn-outline-dark d-flex align-items-center gap-2';
            document.getElementById('userInfo').classList.add('d-none');
        }
    }

    // 同步數據追加寫入 Google 試算表最下方
    async function logToGoogleSheet(dinnerName, actionType) {
        if (!isLoggedIn || !spreadsheetId) return;

        const timestamp = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
        const values = [[timestamp, dinnerName, actionType]];
        const body = { values: values };

        try {
            await gapi.client.sheets.spreadsheets.values.append({
                spreadsheetId: spreadsheetId,
                range: '晚餐紀錄庫!A:C',
                valueInputOption: 'USER_ENTERED',
                resource: body
            });
            console.log(`數據已同步至雲端: [${dinnerName}, ${actionType}]`);
        } catch (err) {
            console.error("寫入 Google Sheet 失敗：", err);
        }
    }

    // 抽晚餐邏輯
    function drawDinner() {
        const availableList = dinnerList.filter(item => !history.includes(item));

        if (availableList.length === 0) {
            if (dinnerList.length === 0) {
                alert("你的菜單空空如也！請先在自訂菜單新增一些菜色吧！");
                return;
            }
            alert("哇！你把自訂菜單裡能吃的東西都吃過一輪了！歷史紀錄將自動重置。");
            clearHistory(true); 
            return;
        }

        const resultDiv = document.getElementById('result');
        resultDiv.style.transform = 'scale(0.9)';
        
        let count = 0;
        const interval = setInterval(() => {
            const tempRandom = availableList[Math.floor(Math.random() * availableList.length)];
            resultDiv.innerText = tempRandom;
            count++;
            if (count > 8) {
                clearInterval(interval);
                
                const finalChoice = availableList[Math.floor(Math.random() * availableList.length)];
                resultDiv.innerText = finalChoice;
                resultDiv.style.transform = 'scale(1)';

                history.push(finalChoice);
                if (history.length > 14) {
                    history.shift(); 
                }

                localStorage.setItem('dinnerHistory14', JSON.stringify(history));
                updateHistoryUI();
                updateMenuUI();

                // 🌟 同步寫入試算表
                logToGoogleSheet(finalChoice, "抽中新晚餐");
            }
        }, 80);
    }

    // 更新歷史紀錄 UI
    function updateHistoryUI() {
        const listEl = document.getElementById('historyList');
        listEl.innerHTML = '';
        
        if (history.length === 0) {
            listEl.innerHTML = '<span class="text-muted small">尚無吃過紀錄</span>';
            return;
        }

        history.forEach((item, index) => {
            const badge = document.createElement('div');
            badge.className = 'badge bg-secondary d-inline-flex align-items-center gap-1 p-2 fs-6 fw-normal rounded-pill shadow-sm';
            badge.innerHTML = `
                <span>${item}</span>
                <button type="button" class="btn-close btn-close-white" style="font-size: 0.55rem; padding: 2px;" aria-label="Remove" onclick="deleteSingleHistory(${index})"></button>
            `;
            listEl.appendChild(badge);
        });
    }

    // 單一刪除歷史紀錄
    function deleteSingleHistory(index) {
        const removedItem = history[index];
        history.splice(index, 1);
        localStorage.setItem('dinnerHistory14', JSON.stringify(history));
        updateHistoryUI();
        updateMenuUI();

        // 🌟 同步標記寫入試算表
        logToGoogleSheet(removedItem, "手動移除歷史 (解除排除限制)");
    }

    // 更新自訂菜單列表的 UI
    function updateMenuUI() {
        const menuListEl = document.getElementById('menuList');
        menuListEl.innerHTML = '';

        dinnerList.forEach((item, index) => {
            const li = document.createElement('li');
            li.className = 'list-group-item d-flex justify-content-between align-items-center border-0 border-bottom px-0 py-2';
            
            const isExcluded = history.includes(item);
            
            let itemContent = '';
            if (isExcluded) {
                itemContent = `<span class="text-decoration-line-through text-muted"><i class="bi bi-slash-circle me-2"></i>${item} <small class="text-danger">(排除中)</small></span>`;
            } else {
                itemContent = `<span><i class="bi bi-check-circle-fill text-success me-2"></i>${item}</span>`;
            }

            li.innerHTML = `
                ${itemContent}
                <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="deleteMenuItem(${index})" title="刪除此項目">
                    <i class="bi bi-trash"></i>
                </button>
            `;
            menuListEl.appendChild(li);
        });
    }

    // 新增菜色
    function addNewItem() {
        const input = document.getElementById('newItemInput');
        const newItem = input.value.trim();

        if (newItem === '') {
            alert('請輸入菜色名稱！');
            return;
        }

        if (dinnerList.includes(newItem)) {
            alert('這個菜色已經在你的菜單裡囉！');
            return;
        }

        dinnerList.push(newItem);
        localStorage.setItem('customDinnerList', JSON.stringify(dinnerList));
        
        input.value = ''; 
        updateMenuUI();
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            addNewItem();
        }
    }

    // 刪除個別菜色
    function deleteMenuItem(index) {
        const deletedItem = dinnerList[index];
        dinnerList.splice(index, 1);
        localStorage.setItem('customDinnerList', JSON.stringify(dinnerList));
        
        history = history.filter(item => item !== deletedItem);
        localStorage.setItem('dinnerHistory14', JSON.stringify(history));

        updateMenuUI();
        updateHistoryUI();
    }

    // 還原為預設清單
    function resetMenuToDefault() {
        if (confirm("確定要把自訂菜單全部清除，並還原成最初的 31 樣預設菜色嗎？")) {
            dinnerList = [...defaultDinnerList];
            localStorage.setItem('customDinnerList', JSON.stringify(dinnerList));
            updateMenuUI();
        }
    }

    // 清除所有歷史紀錄
    function clearHistory(silent = false) {
        if (silent) {
            history = [];
            localStorage.removeItem('dinnerHistory14');
            updateHistoryUI();
            updateMenuUI();
            document.getElementById('result').innerText = '點擊下方按鈕抽籤';
            
            // 🌟 同步寫入試算表
            logToGoogleSheet("全部紀錄", "全部清除歷史");
        } else {
            if (confirm("確定要清除最近 14 天的吃飯紀錄嗎？")) {
                clearHistory(true);
            }
        }
    }
</script>

</body>
</html>
