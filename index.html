<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晚餐抽籤器</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: "Microsoft JhengHei", sans-serif; }
        .card { border-radius: 1.5rem; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .btn-draw { border-radius: 50px; padding: 15px; font-size: 1.25rem; transition: all 0.3s; }
        .btn-draw:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(220,53,69,0.3); }
        .sync-badge { font-size: 0.85rem; padding: 6px 12px; border-radius: 20px; }
    </style>
</head>
<body class="py-4">

<div class="container" style="max-width: 900px;">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 bg-white p-3 rounded-4 shadow-sm border-start border-primary border-5">
        <div class="d-flex align-items-center">
            <div id="syncSpinner" class="spinner-grow spinner-grow-sm text-primary me-2 d-none"></div>
            <span class="fw-bold text-secondary me-2">同步狀態:</span>
            <span id="syncStatus" class="sync-badge bg-warning text-dark">等待載入 SDK...</span>
        </div>
        <div>
            <button id="loginBtn" class="btn btn-dark d-flex align-items-center gap-2 rounded-pill shadow-sm" onclick="handleAuthClick()" disabled>
                <i class="bi bi-google"></i> 載入中...
            </button>
            <div id="userInfo" class="d-none d-flex align-items-center gap-3">
                <span id="userName" class="fw-bold text-primary small">已登入</span>
                <button class="btn btn-sm btn-outline-danger rounded-pill" onclick="handleSignoutClick()">登出</button>
            </div>
        </div>
    </div>

    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold text-danger mb-2">晚餐吃什麼？</h1>
        <p class="text-muted">支援雲端備份與 14 天不重複機制</p>
    </div>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card p-4 h-100">
                <div id="result" class="text-center display-2 fw-bold text-success my-4 py-5 bg-light rounded-4 border-2 shadow-inner" style="border: 2px dashed #dee2e6; min-height: 250px; display: flex; align-items: center; justify-content: center;">
                    準備抽籤
                </div>
                <button id="drawBtn" class="btn btn-danger btn-draw w-100 fw-bold mb-4 shadow" onclick="drawDinner()" disabled>
                    等待同步...
                </button>
                
                <div>
                    <h6 class="text-secondary fw-bold mb-3"><i class="bi bi-calendar-check"></i> 最近 14 天紀錄：</h6>
                    <div id="historyList" class="d-flex flex-wrap gap-2"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card p-4 h-100 shadow-sm">
                <h5 class="fw-bold mb-3">我的菜單</h5>
                <div class="input-group mb-3">
                    <input type="text" id="newItemInput" class="form-control border-end-0" placeholder="想加點什麼？" onkeypress="if(event.key==='Enter') addNewItem()">
                    <button class="btn btn-success" onclick="addNewItem()"><i class="bi bi-plus-lg"></i></button>
                </div>
                <div class="overflow-auto" style="max-height: 350px;">
                    <ul id="menuList" class="list-group list-group-flush"></ul>
                </div>
                <div class="mt-4 border-top pt-3">
                    <button class="btn btn-sm btn-link text-muted w-100" onclick="resetMenuToDefault()">還原預設菜單</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>

<script>
    // ⚠️ 這裡請換回你自己的憑證
    const CLIENT_ID = '562843998665-lifb2eo55nq1nsmh5rr6rn2dkrffocpc.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyDikxXx8y_NEtICRFIVyuSyNVT_s77ccW8';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets';

    let tokenClient;
    let spreadsheetId = null;
    let currentSheetName = ""; 

    const defaultList = ["便當", "披薩", "義大利麵", "肉圓", "水餃", "鍋貼", "速食", "牛排", "火鍋", "壽司", "炒飯", "牛肉麵", "燒臘", "泰料", "雞排", "越南河粉", "臭豆腐", "丼飯", "當歸鴨"];
    let dinnerList = JSON.parse(localStorage.getItem('customDinnerList')) || [...defaultList];
    let history = JSON.parse(localStorage.getItem('dinnerHistory14')) || [];

    function updateStatus(text, color = "bg-success") {
        const s = document.getElementById('syncStatus');
        s.innerText = text;
        s.className = `sync-badge ${color} ${color === 'bg-success' ? 'text-white' : 'text-dark'}`;
    }

    // 初始化 SDK
    window.onload = () => {
        gapi.load('client', async () => {
            await gapi.client.init({ apiKey: API_KEY });
            await gapi.client.load('sheets', 'v4');
            await gapi.client.load('drive', 'v3');
            
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: async (resp) => {
                    if (resp.error) return;
                    localStorage.setItem('google_access_token', resp.access_token);
                    await runFullSyncFlow(resp.access_token);
                }
            });

            document.getElementById('loginBtn').disabled = false;
            document.getElementById('loginBtn').innerHTML = '<i class="bi bi-google"></i> Google 登入';
            
            const savedToken = localStorage.getItem('google_access_token');
            if (savedToken) {
                gapi.client.setToken({ access_token: savedToken });
                runFullSyncFlow(savedToken);
            } else {
                updateStatus("未登入 (僅本地模式)", "bg-warning");
                document.getElementById('drawBtn').disabled = false;
                document.getElementById('drawBtn').innerText = "開始抽籤";
            }
        });
        updateMenuUI();
        updateHistoryUI();
    };

    // 核心同步流程
    async function runFullSyncFlow(token) {
        document.getElementById('syncSpinner').classList.remove('d-none');
        try {
            // 嘗試取得用戶名稱 (UserInfo API)
            try {
                const userResp = await fetch(`https://www.googleapis.com/oauth2/v3/userinfo?access_token=${token}`);
                const userData = await userResp.json();
                if (userData.name) document.getElementById('userName').innerText = userData.name;
            } catch (e) { console.warn("UserInfo fail"); }

            document.getElementById('loginBtn').classList.add('d-none');
            document.getElementById('userInfo').classList.remove('d-none');

            // 1. 查找或建立雲端檔案
            const listRes = await gapi.client.drive.files.list({
                q: "name = 'Dinner_History_Sync' and trashed = false",
                fields: 'files(id)'
            });

            if (listRes.result.files.length > 0) {
                spreadsheetId = listRes.result.files[0].id;
            } else {
                const ss = await gapi.client.sheets.spreadsheets.create({
                    resource: { properties: { title: 'Dinner_History_Sync' } }
                });
                spreadsheetId = ss.result.spreadsheetId;
                await gapi.client.sheets.spreadsheets.values.update({
                    spreadsheetId: spreadsheetId,
                    range: 'A1:C1',
                    valueInputOption: 'USER_ENTERED',
                    resource: { values: [['時間', '項目', '動作']] }
                });
            }

            // 2. 自動偵測工作表分頁名稱 (核心修正：不再死抓 Sheet1)
            const ssMeta = await gapi.client.sheets.spreadsheets.get({ spreadsheetId: spreadsheetId });
            currentSheetName = ssMeta.result.sheets[0].properties.title;

            // 3. 從雲端抓回最新紀錄
            const dataRes = await gapi.client.sheets.spreadsheets.values.get({
                spreadsheetId: spreadsheetId,
                range: `${currentSheetName}!A2:C`
            });
            
            const rows = dataRes.result.values;
            if (rows) {
                const cloudHistory = rows.filter(r => r[2] === "抽中").map(r => r[1]).slice(-14);
                if (cloudHistory.length > 0) {
                    history = cloudHistory;
                    localStorage.setItem('dinnerHistory14', JSON.stringify(history));
                }
            }

            updateStatus("雲端同步已就緒", "bg-success");
            document.getElementById('drawBtn').disabled = false;
            document.getElementById('drawBtn').innerText = "決定就是你了！";
            updateHistoryUI();
            updateMenuUI();

        } catch (e) {
            console.error("Sync Error:", e);
            if (e.status === 401) {
                alert("登入授權已過期或權限不足！\n請重新登入，且『務必勾選』所有權限方框。");
                localStorage.removeItem('google_access_token');
                location.reload();
            } else {
                updateStatus("連線出錯", "bg-danger");
            }
        } finally {
            document.getElementById('syncSpinner').classList.add('d-none');
        }
    }

    async function drawDinner() {
        const pool = dinnerList.filter(i => !history.includes(i));
        if (pool.length === 0) return alert("這輪都吃過啦！請清除紀錄重新開始。");

        const picked = pool[Math.floor(Math.random() * pool.length)];
        document.getElementById('result').innerText = picked;

        history.push(picked);
        if (history.length > 14) history.shift();
        localStorage.setItem('dinnerHistory14', JSON.stringify(history));
        updateHistoryUI();
        updateMenuUI();

        // 非同步上傳雲端
        if (spreadsheetId && currentSheetName) {
            document.getElementById('syncSpinner').classList.remove('d-none');
            try {
                await gapi.client.sheets.spreadsheets.values.append({
                    spreadsheetId: spreadsheetId,
                    range: `${currentSheetName}!A:C`,
                    valueInputOption: 'USER_ENTERED',
                    resource: { values: [[new Date().toLocaleString(), picked, "抽中"]] }
                });
            } catch (err) { console.error("Cloud write fail", err); }
            document.getElementById('syncSpinner').classList.add('d-none');
        }
    }

    // UI 更新函數
    function updateMenuUI() {
        const el = document.getElementById('menuList');
        el.innerHTML = dinnerList.map((item, idx) => `
            <li class="list-group-item d-flex justify-content-between align-items-center ${history.includes(item) ? 'bg-light text-muted text-decoration-line-through' : ''}">
                ${item}
                <button class="btn btn-sm text-danger" onclick="deleteItem(${idx})"><i class="bi bi-x-circle"></i></button>
            </li>`).join('');
    }

    function updateHistoryUI() {
        const el = document.getElementById('historyList');
        el.innerHTML = history.map(item => `<span class="badge bg-secondary rounded-pill p-2">${item}</span>`).join('');
    }

    function addNewItem() {
        const input = document.getElementById('newItemInput');
        const v = input.value.trim();
        if(v && !dinnerList.includes(v)) {
            dinnerList.push(v);
            localStorage.setItem('customDinnerList', JSON.stringify(dinnerList));
            updateMenuUI();
            input.value = '';
        }
    }

    function deleteItem(idx) {
        dinnerList.splice(idx, 1);
        localStorage.setItem('customDinnerList', JSON.stringify(dinnerList));
        updateMenuUI();
    }

    function resetMenuToDefault() {
        if(confirm("確定要還原預設菜單嗎？")) {
            dinnerList = [...defaultList];
            localStorage.setItem('customDinnerList', JSON.stringify(dinnerList));
            updateMenuUI();
        }
    }

    function handleAuthClick() {
        tokenClient.requestAccessToken({ prompt: 'select_account' });
    }

    function handleSignoutClick() {
        localStorage.removeItem('google_access_token');
        location.reload();
    }
</script>
</body>
</html>
