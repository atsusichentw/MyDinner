<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晚餐吃什麼？</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .card { border-radius: 1.25rem; border: none; box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="py-5">

<div class="container" style="max-width: 900px;">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 bg-white p-3 rounded-4 shadow-sm border-start border-primary border-5">
        <div class="d-flex align-items-center">
            <div id="syncSpinner" class="spinner-border spinner-border-sm text-primary me-2 d-none"></div>
            <span class="fw-bold text-secondary">狀態：</span>
            <span id="syncStatus" class="badge bg-warning text-dark">等待載入...</span>
        </div>
        <div>
            <button id="loginBtn" class="btn btn-outline-dark d-flex align-items-center gap-2" onclick="handleAuthClick()" disabled>
                <i class="bi bi-google"></i> 載入中...
            </button>
            <div id="userInfo" class="d-none d-flex align-items-center gap-3">
                <span id="userName" class="fw-bold text-dark small">已登入用戶</span>
                <button class="btn btn-sm btn-outline-danger rounded-pill" onclick="handleSignoutClick()">登出</button>
            </div>
        </div>
    </div>

    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold text-danger">晚餐吃什麼？</h1>
        <p class="text-muted">自動過濾 14 天內重複餐點</p>
    </div>

    <div class="row g-4">
        <div class="col-md-7">
            <div class="card p-4 h-100 shadow-lg">
                <div id="result" class="text-center display-3 fw-bold text-success my-4 py-5 bg-light rounded-4" style="border: 2px dashed #dee2e6; min-height: 200px; display: flex; align-items: center; justify-content: center;">
                    準備抽籤
                </div>
                <button id="drawBtn" class="btn btn-danger btn-lg w-100 rounded-pill py-3 shadow" onclick="drawDinner()" disabled>
                    同步中...
                </button>
                <div class="mt-4">
                    <h6 class="text-secondary fw-bold">最近紀錄：</h6>
                    <div id="historyList" class="d-flex flex-wrap gap-2 mt-2"></div>
                </div>
            </div>
        </div>
        
        <div class="col-md-5">
            <div class="card p-4 h-100 shadow">
                <h5 class="fw-bold mb-3">菜單管理</h5>
                <div class="input-group mb-3">
                    <input type="text" id="newItemInput" class="form-control" placeholder="新增菜色">
                    <button class="btn btn-success" onclick="addNewItem()"><i class="bi bi-plus"></i></button>
                </div>
                <div class="overflow-auto" style="max-height: 300px;">
                    <ul id="menuList" class="list-group list-group-flush"></ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>

<script>
    // ⚠️ 這裡請換回你的憑證
    const CLIENT_ID = '562843998665-lifb2eo55nq1nsmh5rr6rn2dkrffocpc.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyDikxXx8y_NEtICRFIVyuSyNVT_s77ccW8';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets';

    let tokenClient;
    let spreadsheetId = null;
    let currentSheetName = ""; // 用來存儲動態抓到的工作表名稱

    let dinnerList = JSON.parse(localStorage.getItem('customDinnerList')) || ["便當", "披薩", "義大利麵", "肉圓", "水餃", "速食"];
    let history = JSON.parse(localStorage.getItem('dinnerHistory14')) || [];

    function updateStatus(text, color = "bg-success") {
        const s = document.getElementById('syncStatus');
        s.innerText = text;
        s.className = `badge ${color}`;
    }

    window.onload = () => {
        gapi.load('client', async () => {
            await gapi.client.init({ apiKey: API_KEY });
            await gapi.client.load('sheets', 'v4');
            await gapi.client.load('drive', 'v3');
            
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: async (resp) => {
                    if (resp.error) return;
                    localStorage.setItem('google_access_token', resp.access_token);
                    await runSyncFlow(resp.access_token);
                }
            });

            document.getElementById('loginBtn').disabled = false;
            document.getElementById('loginBtn').innerHTML = '<i class="bi bi-google"></i> Google 登入';
            
            const savedToken = localStorage.getItem('google_access_token');
            if (savedToken) {
                gapi.client.setToken({ access_token: savedToken });
                runSyncFlow(savedToken);
            } else {
                updateStatus("未登入 (本地模式)", "bg-warning text-dark");
                document.getElementById('drawBtn').disabled = false;
                document.getElementById('drawBtn').innerText = "開始抽籤";
            }
        });
        updateMenuUI();
        updateHistoryUI();
    };

    async function runSyncFlow(token) {
        document.getElementById('syncSpinner').classList.remove('d-none');
        try {
            // 獲取用戶資訊
            const userResp = await fetch(`https://www.googleapis.com/oauth2/v3/userinfo?access_token=${token}`);
            const userData = await userResp.json();
            if (userData.error) throw new Error("Unauthorized");

            document.getElementById('loginBtn').classList.add('d-none');
            document.getElementById('userInfo').classList.remove('d-none');
            document.getElementById('userName').innerText = userData.name || "已登入用戶";

            // 1. 取得試算表 ID
            const res = await gapi.client.drive.files.list({
                q: "name = 'Dinner_History_Sync' and trashed = false",
                fields: 'files(id)'
            });

            if (res.result.files.length > 0) {
                spreadsheetId = res.result.files[0].id;
            } else {
                const ss = await gapi.client.sheets.spreadsheets.create({
                    resource: { properties: { title: 'Dinner_History_Sync' } }
                });
                spreadsheetId = ss.result.spreadsheetId;
                // 預設建立標頭
                await gapi.client.sheets.spreadsheets.values.update({
                    spreadsheetId: spreadsheetId,
                    range: 'A1:C1',
                    valueInputOption: 'USER_ENTERED',
                    resource: { values: [['時間', '項目', '動作']] }
                });
            }

            // 2. 關鍵：動態抓取第一個工作表的名稱 (解決 Sheet1 報錯)
            const spreadsheet = await gapi.client.sheets.spreadsheets.get({ spreadsheetId: spreadsheetId });
            currentSheetName = spreadsheet.result.sheets[0].properties.title;

            // 3. 同步歷史
            await syncHistory();

            updateStatus("雲端同步已就緒");
            document.getElementById('drawBtn').disabled = false;
            document.getElementById('drawBtn').innerText = "決定就是你了！";
        } catch (e) {
            console.error(e);
            updateStatus("登入已失效，請重新登入", "bg-danger text-white");
            localStorage.removeItem('google_access_token');
        } finally {
            document.getElementById('syncSpinner').classList.add('d-none');
        }
    }

    async function syncHistory() {
        if (!spreadsheetId || !currentSheetName) return;
        const res = await gapi.client.sheets.spreadsheets.values.get({
            spreadsheetId: spreadsheetId,
            range: `${currentSheetName}!A2:C`
        });
        const rows = res.result.values;
        if (rows) {
            const cloudHistory = rows.filter(r => r[2] === "抽中").map(r => r[1]).slice(-14);
            if (cloudHistory.length > 0) {
                history = cloudHistory;
                localStorage.setItem('dinnerHistory14', JSON.stringify(history));
                updateHistoryUI();
                updateMenuUI();
            }
        }
    }

    async function drawDinner() {
        const pool = dinnerList.filter(i => !history.includes(i));
        if (pool.length === 0) return alert("全都吃過啦！");

        const picked = pool[Math.floor(Math.random() * pool.length)];
        document.getElementById('result').innerText = picked;

        history.push(picked);
        if (history.length > 14) history.shift();
        localStorage.setItem('dinnerHistory14', JSON.stringify(history));
        updateHistoryUI();
        updateMenuUI();

        if (spreadsheetId && currentSheetName) {
            document.getElementById('syncSpinner').classList.remove('d-none');
            await gapi.client.sheets.spreadsheets.values.append({
                spreadsheetId: spreadsheetId,
                range: `${currentSheetName}!A:C`,
                valueInputOption: 'USER_ENTERED',
                resource: { values: [[new Date().toLocaleString(), picked, "抽中"]] }
            });
            document.getElementById('syncSpinner').classList.add('d-none');
        }
    }

    // UI 功能 (新增/刪除等) ... 保持原樣
    function updateMenuUI() {
        const el = document.getElementById('menuList');
        el.innerHTML = dinnerList.map((item, idx) => `
            <li class="list-group-item d-flex justify-content-between align-items-center ${history.includes(item) ? 'opacity-50 text-decoration-line-through' : ''}">
                ${item}
                <button class="btn btn-sm text-danger" onclick="deleteItem(${idx})"><i class="bi bi-trash"></i></button>
            </li>`).join('');
    }
    function updateHistoryUI() {
        const el = document.getElementById('historyList');
        el.innerHTML = history.map(item => `<span class="badge bg-secondary rounded-pill">${item}</span>`).join('');
    }
    function addNewItem() {
        const v = document.getElementById('newItemInput').value.trim();
        if(v && !dinnerList.includes(v)) {
            dinnerList.push(v);
            localStorage.setItem('customDinnerList', JSON.stringify(dinnerList));
            updateMenuUI();
            document.getElementById('newItemInput').value='';
        }
    }
    function deleteItem(idx) {
        dinnerList.splice(idx, 1);
        localStorage.setItem('customDinnerList', JSON.stringify(dinnerList));
        updateMenuUI();
    }
    function handleAuthClick() { tokenClient.requestAccessToken({ prompt: 'select_account' }); }
    function handleSignoutClick() { localStorage.removeItem('google_access_token'); location.reload(); }
</script>
</body>
</html>
