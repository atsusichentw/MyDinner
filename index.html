<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晚餐吃什麼？</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: "Microsoft JhengHei", sans-serif; }
        .card { border-radius: 1.5rem; border: none; box-shadow: 0 8px 25px rgba(0,0,0,0.05); }
        #result { min-height: 200px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; border: 3px dashed #dee2e6; border-radius: 1.25rem; background: #fff; margin: 20px 0; text-align: center; padding: 20px; color: #198754; font-weight: bold; }
        .badge-status { font-size: 0.9rem; padding: 6px 12px; border-radius: 20px; }
        .history-badge { font-size: 0.9rem; padding: 8px 15px; border-radius: 50px; background-color: #6c757d; color: white; }
    </style>
</head>
<body class="py-4">

<div class="container" style="max-width: 950px;">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 bg-white p-3 rounded-4 shadow-sm border-bottom border-primary border-3">
        <div class="d-flex align-items-center">
            <div id="syncSpinner" class="spinner-border spinner-border-sm text-primary me-2 d-none"></div>
            <span class="fw-bold text-secondary me-2">同步狀態:</span>
            <span id="syncStatus" class="badge-status bg-warning text-dark">初始化...</span>
        </div>
        <div id="authArea">
            <button id="loginBtn" class="btn btn-outline-dark rounded-pill px-4" onclick="handleAuthClick()" disabled>載入 SDK...</button>
            <div id="userInfo" class="d-none d-flex align-items-center gap-3">
                <span id="userName" class="fw-bold text-dark small">已登入</span>
                <button class="btn btn-sm btn-outline-danger rounded-pill" onclick="handleSignoutClick()">登出</button>
            </div>
        </div>
    </div>

    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold text-danger">晚餐吃什麼？</h1>
        <p class="text-muted">自動過濾 14 天內重複餐點</p>
    </div>

    <div class="row g-4">
        <div class="col-md-7">
            <div class="card p-4 h-100">
                <div id="result">準備抽籤</div>
                <button id="drawBtn" class="btn btn-danger btn-lg w-100 rounded-pill py-3 fw-bold shadow mb-4" onclick="drawDinner()" disabled>等待同步...</button>
                <div>
                    <h6 class="fw-bold text-secondary mb-3"><i class="bi bi-clock-history"></i> 最近 14 天紀錄:</h6>
                    <div id="historyList" class="d-flex flex-wrap gap-2"></div>
                </div>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card p-4 h-100">
                <h5 class="fw-bold mb-3">菜單設定</h5>
                <div class="input-group mb-3">
                    <input type="text" id="newItemInput" class="form-control" placeholder="加入新菜色..." onkeypress="if(event.key==='Enter') addNewItem()">
                    <button class="btn btn-success" onclick="addNewItem()"><i class="bi bi-plus-lg"></i></button>
                </div>
                <div class="overflow-auto" style="max-height: 350px;">
                    <ul id="menuList" class="list-group list-group-flush"></ul>
                </div>
                <div class="mt-3 border-top pt-2">
                    <button class="btn btn-sm btn-link text-muted w-100 text-decoration-none" onclick="resetMenuToDefault()">還原預設菜單</button>
                    <button class="btn btn-sm btn-link text-primary w-100 text-decoration-none" onclick="syncDataFromCloud()">強制重新讀取雲端</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>

<script>
    const CLIENT_ID = '562843998665-lifb2eo55nq1nsmh5rr6rn2dkrffocpc.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyDikxXx8y_NEtICRFIVyuSyNVT_s77ccW8';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets';

    let tokenClient;
    let spreadsheetId = null;
    let currentSheetName = ""; 

    const defaultList = ["便當", "披薩", "義大利麵", "肉圓", "油飯", "胡椒餅", "泡麵", "涼麵", "水餃", "鍋貼", "速食", "蚵仔麵線", "牛排", "滷味", "火鍋", "壽司", "炒飯", "牛肉麵", "燒臘", "泰料", "雞排", "越南河粉", "臭豆腐", "丼飯", "當歸鴨"];
    let dinnerList = JSON.parse(localStorage.getItem('customDinnerList')) || [...defaultList];
    let history = []; // 初始清空，由同步決定

    function setSyncStatus(text, colorClass) {
        const el = document.getElementById('syncStatus');
        el.innerText = text;
        el.className = `badge-status ${colorClass}`;
    }

    window.onload = () => {
        gapi.load('client', async () => {
            await gapi.client.init({ apiKey: API_KEY });
            await gapi.client.load('sheets', 'v4');
            await gapi.client.load('drive', 'v3');
            
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: async (resp) => {
                    if (resp.error) return;
                    localStorage.setItem('google_access_token', resp.access_token);
                    await startSyncProcess(resp.access_token);
                }
            });

            document.getElementById('loginBtn').disabled = false;
            document.getElementById('loginBtn').innerText = "Google 登入同步";

            const savedToken = localStorage.getItem('google_access_token');
            if (savedToken) {
                gapi.client.setToken({ access_token: savedToken });
                startSyncProcess(savedToken);
            } else {
                setSyncStatus("本地模式", "bg-light text-dark shadow-sm border");
                document.getElementById('drawBtn').disabled = false;
                document.getElementById('drawBtn').innerText = "開始抽籤";
            }
        });
        updateMenuUI();
        updateHistoryUI();
    };

    async function startSyncProcess(token) {
        document.getElementById('syncSpinner').classList.remove('d-none');
        try {
            const userResp = await fetch(`https://www.googleapis.com/oauth2/v3/userinfo?access_token=${token}`);
            const userData = await userResp.json();
            if (userData.name) document.getElementById('userName').innerText = userData.name;

            document.getElementById('loginBtn').classList.add('d-none');
            document.getElementById('userInfo').classList.remove('d-none');

            const res = await gapi.client.drive.files.list({
                q: "name = 'Dinner_History_Sync' and trashed = false",
                fields: 'files(id)'
            });

            if (res.result.files.length > 0) {
                spreadsheetId = res.result.files[0].id;
            } else {
                const ss = await gapi.client.sheets.spreadsheets.create({ resource: { properties: { title: 'Dinner_History_Sync' } } });
                spreadsheetId = ss.result.spreadsheetId;
                await gapi.client.sheets.spreadsheets.values.update({
                    spreadsheetId: spreadsheetId,
                    range: 'A1:C1',
                    valueInputOption: 'USER_ENTERED',
                    resource: { values: [['時間', '項目', '操作']] }
                });
            }

            const spreadsheet = await gapi.client.sheets.spreadsheets.get({ spreadsheetId: spreadsheetId });
            currentSheetName = spreadsheet.result.sheets[0].properties.title;

            await syncDataFromCloud();

            setSyncStatus("雲端同步成功", "bg-success text-white");
            document.getElementById('drawBtn').disabled = false;
            document.getElementById('drawBtn').innerText = "決定就是你了！";

        } catch (e) {
            console.error(e);
            setSyncStatus("連線異常", "bg-danger text-white");
        } finally {
            document.getElementById('syncSpinner').classList.add('d-none');
        }
    }

    // ★ 關鍵修正：單筆資料讀取邏輯
    async function syncDataFromCloud() {
        if (!spreadsheetId) return;
        document.getElementById('syncSpinner').classList.remove('d-none');
        
        try {
            const response = await gapi.client.sheets.spreadsheets.values.get({
                spreadsheetId: spreadsheetId,
                range: `${currentSheetName}!A2:C1000` // 抓取資料區
            });
            
            const rows = response.result.values;
            let tempHistory = [];

            if (rows && rows.length > 0) {
                // 修正：遍歷所有列，無論幾筆，只要第二欄(項目)有值就抓
                rows.forEach(row => {
                    const itemName = row[1] ? row[1].toString().trim() : "";
                    if (itemName !== "") {
                        tempHistory.push(itemName);
                    }
                });
            }
            
            // 只要有抓到東西，就更新 history；若完全沒東西，就清空
            history = tempHistory.length > 0 ? tempHistory.slice(-14) : [];
            localStorage.setItem('dinnerHistory14', JSON.stringify(history));
            
            updateHistoryUI();
            updateMenuUI();
            console.log("同步完成，歷史紀錄筆數:", history.length);
        } catch (err) {
            console.error("讀取雲端失敗", err);
        } finally {
            document.getElementById('syncSpinner').classList.add('d-none');
        }
    }

    async function drawDinner() {
        const pool = dinnerList.filter(i => !history.includes(i));
        if (pool.length === 0) return alert("這輪都吃過囉！");

        const picked = pool[Math.floor(Math.random() * pool.length)];
        document.getElementById('result').innerText = picked;

        history.push(picked);
        if (history.length > 14) history.shift();
        localStorage.setItem('dinnerHistory14', JSON.stringify(history));
        updateHistoryUI();
        updateMenuUI();

        if (spreadsheetId) {
            await gapi.client.sheets.spreadsheets.values.append({
                spreadsheetId: spreadsheetId,
                range: `${currentSheetName}!A:C`,
                valueInputOption: 'USER_ENTERED',
                resource: { values: [[new Date().toLocaleString(), picked, "抽中"]] }
            });
        }
    }

    function updateMenuUI() {
        const el = document.getElementById('menuList');
        el.innerHTML = dinnerList.map((item, idx) => `
            <li class="list-group-item d-flex justify-content-between align-items-center ${history.includes(item) ? 'bg-light text-muted text-decoration-line-through' : ''}">
                ${item}
                <button class="btn btn-sm text-danger" onclick="deleteItem(${idx})"><i class="bi bi-trash"></i></button>
            </li>`).join('');
    }

    function updateHistoryUI() {
        const el = document.getElementById('historyList');
        el.innerHTML = history.map(item => `<span class="badge history-badge">${item}</span>`).join('');
    }

    function addNewItem() {
        const input = document.getElementById('newItemInput');
        const v = input.value.trim();
        if(v && !dinnerList.includes(v)) {
            dinnerList.push(v);
            localStorage.setItem('customDinnerList', JSON.stringify(dinnerList));
            updateMenuUI();
            input.value = '';
        }
    }

    function deleteItem(idx) {
        dinnerList.splice(idx, 1);
        localStorage.setItem('customDinnerList', JSON.stringify(dinnerList));
        updateMenuUI();
    }

    function resetMenuToDefault() {
        if(confirm("還原預設菜單？")) {
            dinnerList = [...defaultList];
            localStorage.setItem('customDinnerList', JSON.stringify(dinnerList));
            updateMenuUI();
        }
    }

    function handleAuthClick() {
        tokenClient.requestAccessToken({ prompt: 'select_account' });
    }

    function handleSignoutClick() {
        localStorage.removeItem('google_access_token');
        location.reload();
    }
</script>
</body>
</html>
